services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      - SENTINEL_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
