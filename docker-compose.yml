services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
      # A diferencia del puerto de arriba, este SÍ debe ser alcanzable
      # desde fuera de la VM (no 127.0.0.1) -- syslog no es HTTP, no
      # puede pasar por Nginx/Basic Auth. El acceso se restringe en el
      # firewall (ufw/OCI Security List), ver DEPLOYMENT.md.
      - "514:8514/udp"
      # Puerto extra opcional para el mismo receptor de syslog (ej.
      # separar una fuente nueva sin tocar la que ya funciona en el
      # 514) -- controlado por SENTINEL_SYSLOG_EXTRA_PORTS. Este ya es
      # >1024 así que host y contenedor usan el mismo número, sin el
      # remapeo que sí hace falta para el 514 (privilegiado).
      - "5514:5514/udp"
    volumes:
      - ./data:/app/data
    environment:
      - SENTINEL_INGEST_TOKEN=${SENTINEL_INGEST_TOKEN:-}
      - SENTINEL_REAL_AGENT_HOSTNAME=${SENTINEL_REAL_AGENT_HOSTNAME:-}
      - SENTINEL_REAL_AGENT_IP=${SENTINEL_REAL_AGENT_IP:-}
      - SENTINEL_REAL_AGENT_OS=${SENTINEL_REAL_AGENT_OS:-}
      - SENTINEL_SIMULATION_TICK_SECONDS=${SENTINEL_SIMULATION_TICK_SECONDS:-300}
      - SENTINEL_SYSLOG_PORT=${SENTINEL_SYSLOG_PORT:-8514}
      - SENTINEL_SYSLOG_EXTRA_PORTS=${SENTINEL_SYSLOG_EXTRA_PORTS:-5514}
      - SENTINEL_SYSLOG_AGENT_ID=${SENTINEL_SYSLOG_AGENT_ID:-}
      - SENTINEL_SYSLOG_HOSTNAME=${SENTINEL_SYSLOG_HOSTNAME:-}
      - SENTINEL_SYSLOG_IP=${SENTINEL_SYSLOG_IP:-}
      # JSON: IP de origen -> {agent_id, hostname, os} -- así cada
      # cliente real de syslog (VM Linux, VM Windows, firewall, etc.)
      # queda como su propio agente en vez de mezclarse todos bajo uno
      # solo. Ver DEPLOYMENT.md.
      - SENTINEL_SYSLOG_CLIENTS=${SENTINEL_SYSLOG_CLIENTS:-}
      # JSON: wazuh_agent_id (el que le asigna el propio Wazuh manager
      # al enrolarlo) -> {agent_id, hostname, os} -- para endpoints
      # enrolados en un manager de Wazuh (ej. un Windows), que no se
      # pueden identificar por IP porque comparten remitente UDP con
      # el manager. Ver DEPLOYMENT.md 12.3.
      - SENTINEL_WAZUH_AGENTS=${SENTINEL_WAZUH_AGENTS:-}
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      - SENTINEL_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
