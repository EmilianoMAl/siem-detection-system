# Configuración del ruleset de SENTINEL.
# Editar estos valores no requiere tocar código — el motor de detección
# (engine/detectors/rules.py) los lee vía engine/config.py.

ssh_brute_force:
  fail_threshold: 5          # intentos fallidos desde 1 IP para disparar la alerta
  critical_threshold: 20     # a partir de aquí la severidad sube a CRITICAL

suspicious_sudo:
  patterns:
    - "/etc/shadow"
    - "/etc/passwd"
    - "chmod 777"
    - "/tmp/"
    - ">& /dev/tcp"
    - "wget http"
    - "curl http"
    - "python3 -c"
    - "pty.spawn"
    - "base64 -d"
    - "nc -e"
    - "bash -i"

web_attack:
  patterns:
    - "union select"
    - "' or '1'='1"
    - "<script"
    - "../../"
    - "etc/passwd"
    - "drop table"
    - "; exec"
    - "onerror="

recon_scan:
  distinct_paths_threshold: 10   # paths distintos desde 1 IP en la ventana
  not_found_threshold: 8         # respuestas 404 desde 1 IP en la ventana

fim_critical_change:
  critical_paths:
    - "/etc/passwd"
    - "/etc/shadow"
    - "/etc/ssh/sshd_config"
    - "/root/.ssh/authorized_keys"
    - "/home/*/.ssh/authorized_keys"
    - "/usr/bin/*"

sonicwall_denials:
  fail_threshold: 5          # rechazos desde 1 IP para disparar la alerta
  critical_threshold: 20     # a partir de aquí la severidad sube a CRITICAL

password_spraying:
  distinct_users_threshold: 5   # usuarios DISTINTOS fallidos desde 1 IP -- a diferencia
                                 # de ssh_brute_force (mismo usuario, muchos intentos)

account_creation:
  patterns:
    - "useradd"
    - "adduser"
    - "usermod -ag sudo"
    - "usermod -ag wheel"
    - "usermod -ag admin"

wazuh_promoted_alert:
  high_level: 8       # nivel de Wazuh a partir del cual se promueve a alerta HIGH
  critical_level: 12  # y a partir de aquí, CRITICAL (semántica oficial de niveles de Wazuh)

windows_brute_force:
  fail_threshold: 5          # intentos fallidos (locales o de red) para disparar la alerta
  critical_threshold: 20     # a partir de aquí la severidad sube a CRITICAL
