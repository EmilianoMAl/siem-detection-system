# Reverse proxy para SENTINEL en la VM. Instalar en el HOST de la VM
# (no dentro de Docker) — ver DEPLOYMENT.md.
#
#   sudo cp deploy/nginx/sentinel.conf /etc/nginx/sites-available/sentinel
#   sudo ln -s /etc/nginx/sites-available/sentinel /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    # Dashboard (Streamlit). Necesita el upgrade de conexión porque
    # Streamlit usa un websocket para las actualizaciones en vivo —
    # sin estos headers la UI carga pero se queda "colgada".
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API — útil para navegar /api/docs (Swagger UI) directamente.
    # El dashboard le habla a la API por la red interna de Docker
    # (SENTINEL_API_URL=http://api:8000), no a través de este proxy.
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
